
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Book</title>

    <!-- Flipbook StyleSheet -->
    <link rel="stylesheet" href="css/dflip.min.css">

    <!-- Icons Stylesheet -->
    <link rel="stylesheet" href="css/themify-icons.min.css">
</head>
<body>

    <section class="flipbook">
        <div class="container">
            <div class="flipbook-inner">
                <div class="flipbook-items">
                    <div class="_df_book" height="85vh" webgl="true" source="documents/power-of-habit-chapter-one.pdf" id="df_manual_book"></div>
                </div>
            </div>
        </div>
    </section>
    

    <!-- jQuery  -->
    <script src="js/jquery.min.js" type="text/javascript"></script>

    <!-- Flipbook main Js file -->
    <script src="js/dflip.min.js" type="text/javascript"></script>
    <script>
    jQuery(function() {
        DFLIP.defaults.onReady = function(flipbook) {
            if (flipbook.ui && flipbook.ui.fullScreen) {
                flipbook.ui.fullScreen.trigger('click');
            }
        }
    });
    </script>
</body>
</html>
